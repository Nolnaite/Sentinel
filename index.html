<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>TERMINAL DE SÉCURITÉ - SENTINEL CITY</title>
    <style>
        body {
            background-color: #050505;
            color: #00ff41;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-shadow: 0 0 5px #00ff41;
        }

        #timer {
            font-size: 6em;
            font-weight: bold;
            color: #ff3333;
            margin: 20px 0;
            border: 2px solid #ff3333;
            padding: 10px 40px;
            box-shadow: 0 0 20px #ff3333;
        }

        input {
            background: transparent;
            border: 1px solid #00ff41;
            color: #00ff41;
            padding: 15px;
            font-size: 1.5em;
            width: 350px;
            text-align: center;
            outline: none;
            text-transform: uppercase;
        }

        button {
            background: #00ff41;
            color: black;
            border: none;
            padding: 15px 30px;
            font-size: 1.5em;
            cursor: pointer;
            font-weight: bold;
        }

        #message {
            margin-top: 20px;
            font-size: 1.2em;
            height: 30px;
            font-weight: bold;
        }

        .error { color: #ff3333; }
        .success { color: #00ff41; }
    </style>
</head>
<body>

    <h1>ALERTE INTRUSION</h1>
    <div id="timer">30:00</div>

    <div class="input-area">
        <input type="text" id="passcode" placeholder="CODE..." autofocus>
        <button id="btn-valider">VALIDER</button>
    </div>

    <div id="message"></div>

    <script>
        // CONFIG
        const CODE_CORRECT = "TEST";
        let tempsRestant = 30 * 60;
        let erreurs = 0;

        const display = document.querySelector('#timer');
        const input = document.querySelector('#passcode');
        const msg = document.querySelector('#message');
        const btn = document.querySelector('#btn-valider');

        // Mise à jour du chrono visuel
        function rafraichirChrono() {
            let mins = Math.floor(tempsRestant / 60);
            let secs = tempsRestant % 60;
            display.textContent = `${mins}:${secs < 10 ? '0' + secs : secs}`;
        }

        // Compte à rebours
        const interval = setInterval(() => {
            if (tempsRestant <= 0) {
                clearInterval(interval);
                display.textContent = "ÉCHEC";
                input.disabled = true;
            } else {
                tempsRestant--;
                rafraichirChrono();
            }
        }, 1000);

        // La fonction de vérification
        function verifier() {
            const saisie = input.value.trim().toUpperCase();
            
            if (saisie === CODE_CORRECT) {
                clearInterval(interval);
                document.body.style.backgroundColor = "#002200";
                msg.innerHTML = "<span class='success'>ACCÈS ACCORDÉ</span>";
                input.disabled = true;
            } else {
                erreurs++;
                let malus = 0;
                
                if (erreurs === 1) malus = 2;
                else if (erreurs === 2) malus = 5;
                else malus = 10;

                tempsRestant = Math.max(0, tempsRestant - (malus * 60));
                rafraichirChrono();
                
                msg.innerHTML = `<span class='error'>ERREUR ! PÉNALITÉ -${malus} MIN</span>`;
                input.value = "";
                setTimeout(() => { msg.textContent = ""; }, 2000);
            }
        }

        // Événement CLIC sur le bouton
        btn.addEventListener('click', verifier);

        // Événement touche ENTRÉE
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                verifier();
            }
        });
    </script>
</body>
</html>
