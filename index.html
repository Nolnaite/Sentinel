<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>SENTINEL CITY - TERMINAL FINAL</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap');

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000; color: #0f0;
            font-family: 'Fira Code', monospace;
            overflow: hidden; display: flex;
            justify-content: center; align-items: center;
        }

        /* FOND MATRIX */
        #matrix {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; opacity: 0.4;
        }

        /* INTERFACE */
        #ui {
            position: relative; z-index: 10;
            background: rgba(0, 15, 0, 0.9);
            border: 2px solid #0f0;
            padding: 50px; text-align: center;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.2);
            transition: all 0.3s;
        }

        #timer {
            font-size: 6rem; font-weight: bold; color: #f33;
            text-shadow: 0 0 15px rgba(255, 0, 0, 0.7);
            margin: 20px 0;
        }

        /* ANIMATION TREMBLEMENT (TENSION) */
        .shake { animation: shakeAnim 0.1s infinite; }
        @keyframes shakeAnim {
            0% { transform: translate(1px, 1px); }
            50% { transform: translate(-1px, -1px); }
            100% { transform: translate(1px, -1px); }
        }

        /* EFFET FLASH NUCLÉAIRE */
        #nuke-flash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; z-index: 100; display: none;
        }

        input {
            background: transparent; border: 1px solid #0f0;
            color: #fff; padding: 15px; font-size: 1.2rem;
            width: 250px; text-align: center; outline: none;
        }

        button {
            background: #0f0; color: #000; border: none;
            padding: 15px 30px; font-weight: bold; cursor: pointer;
            margin-left: 10px; font-size: 1.1rem;
        }

        #msg { margin-top: 20px; font-weight: bold; height: 20px; }

        /* EFFET VICTOIRE */
        .win-state { border-color: #fff !important; box-shadow: 0 0 50px #0f0 !important; }
    </style>
</head>
<body>

    <canvas id="matrix"></canvas>
    <div id="nuke-flash"></div>

    <div id="ui">
        <h1 style="letter-spacing: 10px;">CORE OVERLOAD</h1>
        <div id="timer">30:00</div>
        
        <div class="controls">
            <input type="text" id="code-input" placeholder="ENTRER CODE" autofocus>
            <button id="valider">DÉSAMORCER</button>
        </div>
        
        <div id="msg"></div>
    </div>

    <script>
        // CONFIGURATION
        const CODE_VRAI = "TEST";
        let temps = 30 * 60;
        let erreurs = 0;
        let actif = true;

        const timerEl = document.getElementById('timer');
        const inputEl = document.getElementById('code-input');
        const btnEl = document.getElementById('valider');
        const uiEl = document.getElementById('ui');
        const flashEl = document.getElementById('nuke-flash');
        const msgEl = document.getElementById('msg');

        // --- 1. PLUIE MATRIX ---
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const letters = "01010101ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        const fontSize = 16;
        const columns = canvas.width / fontSize;
        const drops = Array(Math.floor(columns)).fill(1);

        function drawMatrix() {
            ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#0f0";
            ctx.font = fontSize + "px monospace";
            for(let i = 0; i < drops.length; i++) {
                const text = letters[Math.floor(Math.random() * letters.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if(drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        let matrixTimer = setInterval(drawMatrix, 33);

        // --- 2. LOGIQUE CHRONO ---
        const interval = setInterval(() => {
            if(!actif) return;
            temps--;

            // Effet de tension (tremblement sous les 5 minutes)
            if (temps < 300) uiEl.classList.add('shake');
            
            if(temps <= 0) {
                exploser();
            }
            updateDisplay();
        }, 1000);

        function updateDisplay() {
            const m = Math.floor(Math.max(0, temps) / 60);
            const s = Math.max(0, temps) % 60;
            timerEl.textContent = `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        // --- 3. ACTIONS FINALES ---
        function exploser() {
            actif = false;
            clearInterval(interval);
            flashEl.style.display = 'block';
            flashEl.animate([
                { opacity: 0 }, { opacity: 1, offset: 0.1 }, { opacity: 1, background: 'black' }
            ], { duration: 4000, fill: 'forwards' });
            
            uiEl.style.display = 'none';
        }

        function gagner() {
            actif = false;
            clearInterval(interval);
            clearInterval(matrixTimer);
            uiEl.classList.remove('shake');
            uiEl.classList.add('win-state');
            timerEl.style.color = "#0f0";
            timerEl.textContent = "SAFE";
            msgEl.innerHTML = "<span style='color:#0f0'>SYSTÈME SÉCURISÉ</span>";
            inputEl.disabled = true;
            btnEl.disabled = true;
        }

        // --- 4. VERIFICATION ---
        function verifier() {
            if(!actif) return;
            const val = inputEl.value.toUpperCase().trim();
            if(val === CODE_VRAI) {
                gagner();
            } else {
                erreurs++;
                let malus = (erreurs === 1) ? 2 : (erreurs === 2) ? 5 : 10;
                temps -= (malus * 60);
                msgEl.innerHTML = `<span style='color:#f33'>ERREUR: -${malus} MIN</span>`;
                inputEl.value = "";
                updateDisplay();
                // Petit flash rouge sur l'UI
                uiEl.style.borderColor = "#f00";
                setTimeout(() => uiEl.style.borderColor = "#0f0", 500);
            }
        }

        btnEl.onclick = verifier;
        inputEl.onkeydown = (e) => { if(e.key === "Enter") verifier(); };

    </script>
</body>
</html>
