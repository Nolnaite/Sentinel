<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENTINEL CITY - PROTOCOLE NUCLÉAIRE</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;500;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }

        body {
            background-color: #000;
            color: #0f0;
            font-family: 'Fira Code', monospace;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1000px;
        }

        #matrix-canvas {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0;
            opacity: 0.3;
        }

        /* --- CONTAINER PRINCIPAL --- */
        #ui-wrapper {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 600px;
            padding: 40px;
            background: rgba(0, 10, 0, 0.9);
            border: 2px solid #0f0;
            border-radius: 4px;
            text-align: center;
            backdrop-filter: blur(10px);
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* --- EFFETS DE DÉFILEMENT (TENSION) --- */
        .tension-shake {
            animation: mini-shake 0.2s infinite;
        }

        @keyframes mini-shake {
            0% { transform: translate(1px, 1px); }
            50% { transform: translate(-1px, -1px); }
            100% { transform: translate(1px, -1px); }
        }

        #timer {
            font-size: 6rem;
            font-weight: 700;
            color: #ff3333;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(255, 51, 51, 0.5);
            position: relative;
        }

        /* Effet Glitch sur le Timer */
        .glitch-timer {
            animation: glitch 1s linear infinite;
        }

        @keyframes glitch {
            2%, 64% { transform: translate(2px,0) skew(0deg); }
            4%, 60% { transform: translate(-2px,0) skew(0deg); }
            62% { transform: translate(0,0) skew(5deg); }
        }

        /* --- INPUTS --- */
        .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
        input {
            flex-grow: 1;
            background: rgba(0, 40, 0, 0.6);
            border: 1px solid #0f0;
            color: #fff;
            padding: 15px;
            font-family: 'Fira Code';
            text-transform: uppercase;
        }
        button {
            background: #0f0;
            color: #000;
            border: none;
            padding: 0 25px;
            font-weight: bold;
            cursor: pointer;
        }

        /* --- EFFET EXPLOSION NUCLÉAIRE --- */
        #flash {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: white;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
        }

        .nuke-active {
            animation: nuke-flash 4s forwards;
        }

        @keyframes nuke-flash {
            0% { opacity: 0; }
            10% { opacity: 1; scale: 1; }
            20% { background: #ff6600; }
            100% { opacity: 1; background: black; }
        }

        .shockwave {
            animation: shockwave-effect 0.5s ease-out;
        }

        @keyframes shockwave-effect {
            0% { transform: scale(1); filter: brightness(1); }
            50% { transform: scale(1.5); filter: brightness(5) saturate(2); }
            100% { transform: scale(1); filter: brightness(1); }
        }

        /* --- EFFET VICTOIRE --- */
        .success-glow {
            box-shadow: 0 0 100px rgba(0, 255, 0, 0.6) !important;
            border-color: #fff !important;
        }

        #scan-line {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 2px;
            background: rgba(0, 255, 0, 0.5);
            display: none;
            z-index: 11;
        }

    </style>
</head>
