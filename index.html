            background: #0000aa; color: white; z-index: 101;
            display: none; padding: 50px; font-family: sans-serif;
        }

        .glitch { animation: glitchAnim 0.1s infinite; }
        @keyframes glitchAnim {

            50% { transform: translate(-2px, -2px); filter: invert(1); }
            100% { transform: translate(1px, -1px); }
        }
    </style>
</head>
